name: Auto Video Poster

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            imagemagick \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji
          
          echo "✅ FFmpeg installed:"
          ffmpeg -version | head -n1

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          
          # Install setuptools first
          pip install setuptools==69.1.0
          
          # Force install compatible Pillow version
          pip uninstall -y Pillow 2>/dev/null || true
          pip install Pillow==9.5.0
          
          # Install requirements
          pip install -r requirements.txt
          
          # Verify Pillow version
          echo "🖼️ Pillow version check:"
          python -c "import PIL; print(f'Pillow: {PIL.__version__}')"
          
          # Check ANTIALIAS availability
          python -c "from PIL import Image; print(f'ANTIALIAS available: {hasattr(Image, \"ANTIALIAS\")}')"
          
          echo "📦 Critical packages:"
          pip list | grep -E "Pillow|moviepy|imageio|edge-tts"

      - name: Verify MoviePy
        run: |
          python -c "
          import sys
          try:
              from PIL import Image
              print(f'✅ Pillow {Image.__version__}')
              print(f'✅ ANTIALIAS: {hasattr(Image, \"ANTIALIAS\")}')
              
              import moviepy.editor as mp
              print('✅ MoviePy OK')
              
              from moviepy.editor import VideoFileClip, ImageClip, AudioFileClip
              print('✅ All clips OK')
              
          except Exception as e:
              print(f'❌ Error: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Run Video Poster Bot
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 Starting Video Poster Bot"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          python bot.py

      - name: Upload Debug Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_number }}
          path: |
            *.log
            /tmp/tmp*.mp4
            /tmp/tmp*.mp3
            /tmp/tmp*.png
          retention-days: 2
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/tmp*.mp4 /tmp/tmp*.mp3 /tmp/tmp*.png /tmp/tmp*.jpg 2>/dev/null || true
          echo "✅ Cleanup done"

      - name: Job Summary
        if: always()
        run: |
          echo "## 📊 Auto Video Poster Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.11 |" >> $GITHUB_STEP_SUMMARY
          echo "| Pillow | 9.5.0 |" >> $GITHUB_STEP_SUMMARY
          echo "| MoviePy | 1.0.3 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Success!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Failed - check logs" >> $GITHUB_STEP_SUMMARY
          fi
