name: Auto Video Poster

on:
  schedule:
    - cron: '0 */5 * * *'  # Every 5 hours
  workflow_dispatch:  # Manual trigger

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            imagemagick \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji
          
          # Verify FFmpeg
          ffmpeg -version | head -n1
          
          # Fix ImageMagick policy for PDF/video processing
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true
          sudo sed -i 's/rights="none" pattern="VIDEO"/rights="read|write" pattern="VIDEO"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Cache Python Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          
          # Verify critical packages
          echo "📦 Installed packages:"
          pip list | grep -E "moviepy|imageio|Pillow|edge-tts|requests|numpy"

      - name: Verify MoviePy
        run: |
          python -c "
          import sys
          try:
              import moviepy.editor as mp
              from moviepy.config import get_setting
              print('✅ moviepy.editor OK')
              print(f'MoviePy version: {mp.__version__}')
              print(f'FFmpeg: {get_setting(\"FFMPEG_BINARY\")}')
          except Exception as e:
              print(f'❌ Error: {e}')
              sys.exit(1)
          "

      - name: Verify Edge-TTS
        run: |
          python -c "
          import edge_tts
          print('✅ edge-tts OK')
          print(f'Version: {edge_tts.__version__}')
          "

      - name: Check Fonts
        run: |
          fc-list | grep -i "liberation\|dejavu\|noto" | head -5

      - name: Run Video Poster Bot
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Starting bot..."
          python bot.py

      - name: Upload Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_number }}
          path: |
            *.log
            /tmp/tmp*.mp4
            /tmp/tmp*.mp3
            /tmp/tmp*.png
          retention-days: 2

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/tmp*.mp4 /tmp/tmp*.mp3 /tmp/tmp*.png /tmp/tmp*.jpg
          echo "✅ Cleanup done"

      - name: Job Summary
        if: always()
        run: |
          echo "## 📊 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.11 |" >> $GITHUB_STEP_SUMMARY
          echo "| MoviePy | 1.0.3 |" >> $GITHUB_STEP_SUMMARY
          echo "| FFmpeg | $(ffmpeg -version 2>&1 | head -n1 | cut -d' ' -f3) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Video posted successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Job failed - check logs" >> $GITHUB_STEP_SUMMARY
          fi
