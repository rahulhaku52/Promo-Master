name: Auto Video Poster

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            imagemagick \
            fonts-liberation \
            fonts-dejavu-core \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji
          
          ffmpeg -version | head -n1
          
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml 2>/dev/null || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install setuptools==69.1.0
          pip install -r requirements.txt
          echo "📦 Installed packages:"
          pip list | grep -E "setuptools|moviepy|imageio|Pillow|edge-tts|requests|numpy"

      - name: Verify MoviePy
        run: |
          python -c "
          import sys
          try:
              import moviepy.editor as mp
              print('✅ moviepy.editor OK')
              print(f'MoviePy version: {mp.__version__}')
              from moviepy.config import get_setting
              print(f'FFmpeg: {get_setting(\"FFMPEG_BINARY\")}')
          except Exception as e:
              print(f'❌ Error: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          "

      - name: Verify Edge-TTS
        run: |
          python -c "import edge_tts; print('✅ edge-tts OK')"

      - name: Run Video Poster Bot
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Starting bot..."
          python bot.py

      - name: Upload Artifacts on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_number }}
          path: |
            *.log
            /tmp/tmp*.mp4
            /tmp/tmp*.mp3
            /tmp/tmp*.png
          retention-days: 2

      - name: Cleanup
        if: always()
        run: |
          rm -f /tmp/tmp*.mp4 /tmp/tmp*.mp3 /tmp/tmp*.png /tmp/tmp*.jpg
          echo "✅ Cleanup done"

      - name: Job Summary
        if: always()
        run: |
          echo "## 📊 Workflow Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python | 3.10 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ job.status }}" == "success" ]; then
            echo "### ✅ Video posted successfully!" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Job failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi
