name: Auto Video Poster

on:
  schedule:
    - cron: '0 */5 * * *'  # প্রতি ৫ ঘণ্টায় রান করবে
  workflow_dispatch:        # ম্যানুয়ালি চালানোর বাটন

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            imagemagick \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # 🔥 সরাসরি ইনস্টল (requirements.txt-এ না থাকলেও চলবে)
          pip install moviepy Pillow gTTS requests

      - name: Run Video Poster Bot
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python bot.py
