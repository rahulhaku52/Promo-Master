name: Auto Video Poster

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            imagemagick \
            fonts-noto-core \
            fonts-noto-cjk \
            fonts-noto-color-emoji

      # 🔥 ImageMagick সিকিউরিটি পলিসি ফিক্স (সাবটাইটেলের জন্য)
      - name: Fix ImageMagick Policy
        run: |
          sudo sed -i 's/<policy domain="path" rights="none" pattern="@\*"/<policy domain="path" rights="read|write" pattern="@\*"/g' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="coder" rights="none" pattern="LABEL"/<policy domain="coder" rights="read|write" pattern="LABEL"/g' /etc/ImageMagick-6/policy.xml || true
          sudo sed -i 's/<policy domain="coder" rights="none" pattern="TEXT"/<policy domain="coder" rights="read|write" pattern="TEXT"/g' /etc/ImageMagick-6/policy.xml || true

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install numpy==1.24.3
          pip install moviepy==1.0.3 Pillow gTTS requests
          pip freeze

      - name: Run Video Poster Bot
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          UNSPLASH_API_KEY: ${{ secrets.UNSPLASH_API_KEY }}
        run: python bot.py
